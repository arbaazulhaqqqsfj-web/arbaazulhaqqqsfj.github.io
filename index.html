<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbaaz Ulhaq | Cloud Developer</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1d; color: white; padding: 50px; }
        #typewriter { color: #3498db; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1 id="typewriter"></h1><span class="cursor">|</span>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const typewriterElement = document.getElementById('typewriter');
            const textToType = "Cloud Developer.";
            let charIndex = 0;

            function type() {
                if (charIndex < textToType.length) {
                    typewriterElement.textContent += textToType.charAt(charIndex);
                    charIndex++;
                    setTimeout(type, 100);
                }
            }

            // Start typing after 1 second
            setTimeout(type, 1000);
        });
    </script>
</body>
</html>
