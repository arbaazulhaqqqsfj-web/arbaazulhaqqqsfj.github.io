<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbaaz Ulhaq | Cloud Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 { font-size: 2.5rem; margin-bottom: 0; }
        
        /* Typewriter Styling */
        #typewriter-container {
            font-size: 1.5rem;
            color: var(--accent);
            height: 1.6em;
            margin-bottom: 30px;
        }

        .cursor {
            font-weight: bold;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .skills-tag {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.9rem;
            border: 1px solid var(--accent);
        }

        .contact-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: 0.3s;
        }

        .contact-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="arbaaz.jpg" alt="Arbaaz Ulhaq" class="profile-img">
        
        <h1>Arbaaz Ulhaq</h1>
        
        <div id="typewriter-container">
            <span id="typewriter"></span><span class="cursor">|</span>
        </div>

        <div class="card scroll-reveal">
            <h3>Professional Summary</h3>
            <p>Cloud Developer focused on building scalable AWS/Azure solutions. Expert in containerization, CI/CD, and infrastructure-as-code.</p>
        </div>

        <div class="card scroll-reveal">
            <h3>Key Skills</h3>
            <span class="skills-tag">AWS / Azure</span>
            <span class="skills-tag">Docker & Kubernetes</span>
            <span class="skills-tag">Terraform</span>
            <span class="skills-tag">Python / JavaScript</span>
            <span class="skills-tag">CI/CD Pipelines</span>
        </div>

        <a href="mailto:your-email@example.com" class="contact-btn">Hire Me</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Typewriter logic
            const text = "Cloud Developer & DevOps Enthusiast";
            const speed = 100;
            let i = 0;

            function typeWriter() {
                if (i < text.length) {
                    document.getElementById("typewriter").innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }

            // Scroll reveal logic
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));

            // Start typing
            setTimeout(typeWriter, 500);
        });
    </script>
</body>
</html>
